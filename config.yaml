data:
  drugbank_xml: data/raw/drugbank.xml
  graph_dir: data/graph
  limit_side_effects: 50
  processed_dir: data/processed
  raw_dir: data/raw
  sider_tsv: data/raw/sider.tsv
  string_links: data/raw/9606.protein.links.v12.0.txt
  string_mapping: data/raw/protein.aliases.v12.0.txt
  twosides_csv: data/raw/TWOSIDES.csv
explanation:
  faithfulness_samples: 100
  k_hop: 2
  methods:
  - attention
  - gnnexplainer
  - pgexplainer
  - kec
  num_pairs: 200
model:
  attention_type: sparse
  batch_size: 256
  dropout: 0.2
  drug_hidden: 64
  epochs: 100
  gat_heads: 2
  gat_hidden: 64
  gat_layers: 2
  learning_rate: 0.001
  protein_hidden: 64
  type: gt
usability:
  num_participants: 8
  survey_output: usability/survey_results.csv
